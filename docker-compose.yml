version: '3.9'

services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: na3eeman_website
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    ports:
      - "${WEBSITE_PORT:-3000}:80"
    networks:
      - website_network
    restart: unless-stopped

networks:
  website_network:
    name: na3eeman_website_network
    driver: bridge
